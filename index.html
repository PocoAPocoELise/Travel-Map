<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mes voyages</title>
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
  <script src="https://cdn.jsdelivr.net/npm/topojson-client@3"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: transparent; padding: 16px; }
    .counters { display: flex; justify-content: center; gap: 24px; margin-bottom: 16px; }
    .counter { width: 110px; height: 110px; border-radius: 50%; background: white; border: 2px solid #e5e7eb; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .counter-n { font-size: 30px; font-weight: 700; color: #111; line-height: 1; }
    .counter-l { font-size: 11px; color: #111; margin-top: 4px; text-align: center; line-height: 1.3; max-width: 80px; }
    .add-row { display: flex; gap: 8px; margin-bottom: 6px; }
    .add-row input { flex: 1; padding: 10px 14px; border: 1.5px solid #e5e7eb; border-radius: 50px; font-size: 14px; outline: none; color: #111; background: white; }
    .add-row input:focus { border-color: #a78bfa; }
    .add-row input::placeholder { color: #9ca3af; }
    .add-row button { padding: 10px 20px; background: #111; color: white; border: none; border-radius: 50px; font-size: 14px; cursor: pointer; }
    .add-row button:hover { background: #333; }
    .map-wrap { border-radius: 16px; overflow: hidden; position: relative; margin-bottom: 12px; }
    svg { display: block; width: 100%; }
    .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
    .tag { display: flex; align-items: center; gap: 5px; background: white; border: 1.5px solid #e5e7eb; border-radius: 50px; padding: 5px 12px; font-size: 12px; color: #111; }
    .tag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tag button { background: none; border: none; cursor: pointer; color: #9ca3af; font-size: 15px; line-height: 1; padding: 0; margin-left: 2px; }
    .tag button:hover { color: #ef4444; }
    .err { font-size: 12px; color: #ef4444; min-height: 18px; margin-bottom: 4px; padding-left: 4px; }
    #tip { display:none; position:absolute; background:white; border:1px solid #e5e7eb; border-radius:10px; padding:7px 12px; font-size:13px; font-weight:500; color:#111; pointer-events:none; z-index:20; }
  </style>
</head>
<body>

<div class="counters">
  <div class="counter">
    <div class="counter-n">195</div>
    <div class="counter-l">Pays dans le monde</div>
  </div>
  <div class="counter">
    <div class="counter-n" id="c-visited">0</div>
    <div class="counter-l">Pays visités</div>
  </div>
</div>

<div class="add-row">
  <input type="text" id="inp" placeholder="Ajoute un pays visité..." />
  <button onclick="addCountry()">+ Ajouter</button>
</div>
<div class="err" id="err"></div>

<div class="map-wrap">
  <svg id="map"></svg>
  <div id="tip"></div>
</div>
<div class="tags" id="tags"></div>

<script>
const PALETTE = [
  "#f87171","#fb923c","#fbbf24","#a3e635","#34d399",
  "#22d3ee","#60a5fa","#a78bfa","#f472b6","#f97316",
  "#10b981","#3b82f6","#8b5cf6","#ec4899","#14b8a6"
];

const ISO = {
  "france":"250","italie":"380","italy":"380","espagne":"724","spain":"724",
  "portugal":"620","grèce":"300","greece":"300","allemagne":"276","germany":"276",
  "royaume-uni":"826","uk":"826","angleterre":"826","grande-bretagne":"826",
  "pays-bas":"528","netherlands":"528","hollande":"528",
  "belgique":"056","belgium":"056","suisse":"756","switzerland":"756",
  "autriche":"040","austria":"040","suède":"752","sweden":"752",
  "norvège":"578","norway":"578","danemark":"208","denmark":"208",
  "finlande":"246","finland":"246","islande":"352","iceland":"352",
  "pologne":"616","poland":"616","croatie":"191","croatia":"191",
  "roumanie":"642","romania":"642","hongrie":"348","hungary":"348",
  "ukraine":"804","russie":"643","russia":"643","turquie":"792","turkey":"792",
  "albanie":"008","albania":"008",
  "serbie":"688","serbia":"688","bosnie":"070","bosnia":"070",
  "monténégro":"499","montenegro":"499","macédoine":"807","macedonia":"807",
  "slovaquie":"703","slovakia":"703","slovénie":"705","slovenia":"705",
  "tchéquie":"203","czech republic":"203","republique tcheque":"203",
  "bulgarie":"100","bulgaria":"100","lituanie":"440","lithuania":"440",
  "lettonie":"428","latvia":"428","estonie":"233","estonia":"233",
  "irlande":"372","ireland":"372","luxembourg":"442",
  "malte":"470","malta":"470","chypre":"196","cyprus":"196",
  "moldova":"498","bielorussie":"112","belarus":"112",
  "georgie":"268","georgia":"268","armenie":"051","armenia":"051",
  "azerbaidjan":"031","azerbaijan":"031",
  "thailande":"764","thailand":"764",
  "japon":"392","japan":"392","chine":"156","china":"156",
  "inde":"356","india":"356","vietnam":"704",
  "cambodge":"116","cambodia":"116","indonesie":"360","indonesia":"360",
  "malaisie":"458","malaysia":"458","singapour":"702","singapore":"702",
  "philippines":"608","coree du sud":"410","south korea":"410","taiwan":"158",
  "nepal":"524","sri lanka":"144","myanmar":"104","birmanie":"104",
  "laos":"418","bangladesh":"050","pakistan":"586",
  "iran":"364","israel":"376","jordanie":"400","jordan":"400",
  "arabie saoudite":"682","saudi arabia":"682","emirats arabes unis":"784","uae":"784",
  "qatar":"634","oman":"512","kazakhstan":"398","mongolie":"496","mongolia":"496",
  "etats-unis":"840","usa":"840","canada":"124",
  "mexique":"484","mexico":"484","cuba":"192","jamaique":"388","jamaica":"388",
  "guatemala":"320","costa rica":"188","panama":"591",
  "colombie":"170","colombia":"170","venezuela":"862",
  "bresil":"076","brazil":"076",
  "perou":"604","peru":"604","bolivie":"068","bolivia":"068",
  "chili":"152","chile":"152","argentine":"032","argentina":"032",
  "uruguay":"858","paraguay":"600","equateur":"218","ecuador":"218",
  "maroc":"504","morocco":"504","algerie":"012","algeria":"012",
  "tunisie":"788","tunisia":"788","libye":"434","libya":"434",
  "egypte":"818","egypt":"818",
  "senegal":"686","ghana":"288","nigeria":"566",
  "cameroun":"120","cameroon":"120","kenya":"404","tanzanie":"834","tanzania":"834",
  "ethiopie":"231","ethiopia":"231","ouganda":"800","uganda":"800",
  "rwanda":"646","mozambique":"508","madagascar":"450","zimbabwe":"716",
  "namibie":"516","namibia":"516","botswana":"072",
  "afrique du sud":"710","south africa":"710","angola":"024",
  "mali":"466","niger":"562","tchad":"148","chad":"148",
  "cote d'ivoire":"384","ivory coast":"384","burkina faso":"854",
  "australie":"036","australia":"036","nouvelle-zelande":"554","new zealand":"554",
  "fidji":"242","fiji":"242",
};

function norm(s){ return s.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").trim(); }
function getNum(name){
  const n=norm(name);
  for(const[k,v] of Object.entries(ISO)){ if(norm(k)===n) return v; }
  for(const[k,v] of Object.entries(ISO)){ if(n.includes(norm(k))) return v; }
  return null;
}

let visited = JSON.parse(localStorage.getItem("travel-visited")||"[]");

const svgEl = document.getElementById("map");
const tip = document.getElementById("tip");
const svg = d3.select(svgEl).attr("viewBox","0 0 900 450");
const proj = d3.geoNaturalEarth1().scale(900/6.3).translate([450,225]);
const path = d3.geoPath().projection(proj);
let worldData = null;

d3.json("https://cdn.jsdelivr.net/npm/world-atlas@2/countries-110m.json").then(w => {
  worldData = w; redraw();
});

function redraw(){
  if(!worldData) return;
  const colorMap = new Map();
  visited.forEach((v,i) => { if(v.num) colorMap.set(v.num, { color: PALETTE[i % PALETTE.length], name: v.name }); });

  const countries = topojson.feature(worldData, worldData.objects.countries);
  svg.selectAll("path.c").remove();
  svg.selectAll("path.c").data(countries.features).join("path").attr("class","c")
    .attr("d", path)
    .attr("fill", d => {
      const id = String(d.id).padStart(3,"0");
      return colorMap.has(id) ? colorMap.get(id).color : "#e2e8f0";
    })
    .attr("stroke","#fff").attr("stroke-width", 0.5)
    .on("mouseover", function(e,d){
      const id=String(d.id).padStart(3,"0");
      const info=colorMap.get(id); if(!info) return;
      tip.style.display="block"; tip.innerHTML=info.name;
      d3.select(this).attr("opacity",.8);
    })
    .on("mousemove", e => { tip.style.left=(e.offsetX+12)+"px"; tip.style.top=(e.offsetY-30)+"px"; })
    .on("mouseout", function(){ tip.style.display="none"; d3.select(this).attr("opacity",1); });

  document.getElementById("c-visited").textContent = visited.length;
  localStorage.setItem("travel-visited", JSON.stringify(visited));

  document.getElementById("tags").innerHTML = visited.map((v,i) => `
    <div class="tag">
      <div class="tag-dot" style="background:${PALETTE[i % PALETTE.length]}"></div>
      ${v.name}
      <button onclick="remove(${i})">x</button>
    </div>`).join("");
}

function addCountry(){
  const inp=document.getElementById("inp"), err=document.getElementById("err");
  const val=inp.value.trim();
  if(!val){ err.textContent="Saisis un pays."; return; }
  if(visited.find(v=>norm(v.name)===norm(val))){ err.textContent="Deja ajoute !"; inp.value=""; return; }
  const num=getNum(val);
  if(!num){ err.textContent='"'+val+'" non reconnu - essaie en anglais.'; return; }
  err.textContent=""; visited.push({name:val,num}); inp.value=""; redraw();
}

function remove(i){ visited.splice(i,1); redraw(); }
document.getElementById("inp").addEventListener("keydown", e=>{ if(e.key==="Enter") addCountry(); });
</script>
</body>
</html>
